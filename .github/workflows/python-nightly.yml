name: Python Nightly Tests

on:
  push:
    branches:
    - '**/*nightly*'
  schedule:
    # Run at 2:22am early every morning Eastern time (6/7:22 UTC)
    # so that we get tips of CPython development tested.
    # https://crontab.guru/#22_7_%2a_%2a_%2a
  - cron: 22 7 * * *
  workflow_dispatch:

defaults:
  run:
    shell: bash

env:
  PIP_DISABLE_PIP_VERSION_CHECK: 1
  LOCK_SUFFIX: .lock

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: ${{ matrix.python-version }} on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    # If it doesn't finish in an hour, it's not going to. Don't spin for six
    # hours needlessly.
    timeout-minutes: 60

    strategy:
      matrix:
        platform:
          # Choose a recent Ubuntu that deadsnakes still builds all the versions for.
          # For example, deadsnakes doesn't provide 3.10 nightly for 22.04 (jammy)
          # because jammy ships 3.10, and deadsnakes doesn't want to clobber it.
          # https://launchpad.net/~deadsnakes/+archive/ubuntu/nightly/+packages
          # https://github.com/deadsnakes/issues/issues/234
          # See https://github.com/deadsnakes/nightly for the source of the nightly
          # builds.
          # bionic: 18, focal: 20, jammy: 22, noble: 24
        - ubuntu-22.04
        python-version:
          # When changing this list, be sure to check the [gh] list in
          # tox.ini so that tox will run properly. PYVERSIONS
          # Available versions:
          # https://launchpad.net/~deadsnakes/+archive/ubuntu/nightly/+packages
          # https://launchpad.net/~deadsnakes/+archive/ubuntu/ppa
        - '3.12'
        - '3.13'
          # - "3.14-full"
          # https://github.com/actions/setup-python#available-versions-of-pypy
        - pypy-3.10-nightly
      fail-fast: false

    steps:
    - name: Check out the repo
      uses: actions/checkout@v6.0.2

    - name: Get latest tag
      id: vars
      run: |
        echo "tag=$(git describe --tags)" >> $GITHUB_OUTPUT

    - name: Install ${{ matrix.python-version }} with deadsnakes
      uses: deadsnakes/action@ef54298f4881dc40a8a4e9b367f91578fdbe12a1
      if: "!startsWith(matrix.python-version, 'pypy-')"
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install ${{ matrix.python-version }} with setup-python
      uses: actions/setup-python@v6.2.0
      if: startsWith(matrix.python-version, 'pypy-')
      with:
        python-version: ${{ matrix.python-version }}

    - name: Show diagnostic info
      run: |
        set -xe
        python -VV
        python -m site
        env

    - name: Install dependencies
      run: |
        python -m pip install build wheel setuptools-scm click -r requirements/tox${{ env.LOCK_SUFFIX }}  -r requirements/prod${{ env.LOCK_SUFFIX }}  -r requirements/kit${{ env.LOCK_SUFFIX }}

    - name: build
      env:
        RELEASE_VERSION: ${{ steps.vars.outputs.tag }}
      run: |
        python -m build

    - name: Set OS and Python short vars
      run: |
        platform="${{ matrix.platform }}"
        python_version="${{ matrix.python-version }}"
        echo "OS_SHORT=${platform%%-*}" >> $GITHUB_ENV
        echo "OS_SHORT=${OS_SHORT/ubuntu/linux}" >> $GITHUB_ENV
        # Remove '-nightly' suffix if present
        python_version=${python_version%-nightly}
        if [[ "$python_version" == pypy-* ]]; then
          ver_short="${python_version//-/}"  # pypy3.10
        else
          ver_short="py${python_version//-/}"  # py3.14
        fi
        ver_short="${ver_short//./}"  # remove dots → pypy310 or py314
        echo "VER_SHORT=$ver_short" >> $GITHUB_ENV

    - name: Run tox
      run: |
        echo "env.OS_SHORT ${{ env.OS_SHORT }}"
        echo "env.VER_SHORT ${{ env.VER_SHORT }}"
        python -m tox -vv -c tox-test.ini -e ${{ env.VER_SHORT }}-${{ env.OS_SHORT }}
